name: hexagonal-solution-template-bff

services:
  mock-api:
    container_name: mock-api
    build:
      context: .
      dockerfile: Dockerfile.MockApi
    ports:
      - "5012:5012"
    healthcheck:
      test: ["CMD", "curl", "--http2-prior-knowledge", "-v", "http://localhost:5012/health"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 15s
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_SERVICE_NAME=Hexagonal.Solution.Template.Bff.MockApi
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc

  redis:
    image: redis:8
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 5
      start_period: 15s

  alloy:
    container_name: alloy
    image: grafana/alloy:v1.7.5
    ports:
      - 12345:12345
      - 4318:4318
      - 4317:4317
    volumes:
      - ./scripts/grafana/config.alloy:/etc/alloy/config.alloy
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - loki
      - prometheus
      - tempo

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.1.0
    ports:
      - 9090:9090
    volumes:
      - ./scripts/grafana/prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-otlp-receiver --enable-feature=exemplar-storage

  loki:
    container_name: loki
    image: grafana/loki:3.4.2
    ports:
      - "3100:3100"
    volumes:
      - ./scripts/grafana/loki-config.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    container_name: grafana
    image: grafana/grafana:11.5.2
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=accessControlOnCall
    ports:
      - 3000:3000/tcp
    volumes:
      - ./scripts/grafana:/etc/grafana/provisioning
      - ./scripts/grafana/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml

  tempo-init:
    container_name: tempo-init
    image: &tempoImage grafana/tempo:2.7.1
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./scripts/grafana/tempo-data:/var/tempo

  memcached:
    container_name: tempo-memcached
    image: memcached:1.6.29
    ports:
      - "11211:11211"
    environment:
      - MEMCACHED_MAX_MEMORY=64m  # Set the maximum memory usage
      - MEMCACHED_THREADS=4       # Number of threads to use

  tempo:
    container_name: tempo
    image: *tempoImage
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./scripts/grafana/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # tempo
    depends_on:
      - tempo-init
      - memcached
