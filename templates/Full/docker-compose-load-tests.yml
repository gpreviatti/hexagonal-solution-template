name: hexagonal-solution-template-full-load-tests

services:
  k6:
    image: grafana/k6:1.4.2
    depends_on:
      webapp:
        condition: service_healthy
    ports:
      - "6565:6565"
      - "5665:5665"
    environment:
      - WEBAPP_URL=http://webapp:5000
      - K6_SUMMARY_MODE=full
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_EXPORT=html-report.html
    command: ["run", "/LoadTests/scriptHttp.js", ]
    volumes:
      - ./tests/LoadTests:/LoadTests
    networks:
      - hexagonal_solution_template_full_network

  webapp:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - LOGGING__LOGLEVEL__MICROSOFT_ENTITY_FRAMEWORK_CORE=Warning
      - LOGGING__LOGLEVEL__MICROSOFT_ENTITY_FRAMEWORK_CORE_DATABASE_COMMAND=Warning
      - ENABLE_SENSITIVE_DATA_LOGGING=false
      - OTEL_SERVICE_NAME=Hexagonal.Solution.Template.WebApp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=load-tests
      - ConnectionStrings__OrderDb=Host=postgres;Port=5432;Database=OrderDb;Username=postgres;Password=cY5VvZkkh4AzES
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@rabbitmq:5672/
    networks:
      - hexagonal_solution_template_full_network

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    networks:
      - hexagonal_solution_template_full_network

  postgres-init:
    extends:
      file: docker-compose.yml
      service: postgres-init
    networks:
      - hexagonal_solution_template_full_network
  
  pgadmin:
    extends:
      file: docker-compose.yml
      service: pgadmin
    networks:
      - hexagonal_solution_template_full_network

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    networks:
      - hexagonal_solution_template_full_network

  rabbitmq:
    extends:
      file: docker-compose.yml
      service: rabbitmq
    networks:
      - hexagonal_solution_template_full_network

  alloy:
    extends:
      file: docker-compose-grafana.yml
      service: alloy
    networks:
      - hexagonal_solution_template_full_network

  prometheus:
    extends:
      file: docker-compose-grafana.yml
      service: prometheus
    networks:
      - hexagonal_solution_template_full_network

  loki:
    extends:
      file: docker-compose-grafana.yml
      service: loki
    networks:
      - hexagonal_solution_template_full_network

  grafana:
    extends:
      file: docker-compose-grafana.yml
      service: grafana
    networks:
      - hexagonal_solution_template_full_network

  tempo-init:
    extends:
      file: docker-compose-grafana.yml
      service: tempo-init
    networks:
      - hexagonal_solution_template_full_network

  memcached:
    extends:
      file: docker-compose-grafana.yml
      service: memcached
    networks:
      - hexagonal_solution_template_full_network

  tempo:
    extends:
      file: docker-compose-grafana.yml
      service: tempo
    networks:
      - hexagonal_solution_template_full_network

networks:
  hexagonal_solution_template_full_network:
    driver: bridge
