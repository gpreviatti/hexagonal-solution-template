name: Validate

on: 
  pull_request:
  workflow_dispatch:
    inputs:
      run_full:
        description: 'Run Full Template validation'
        required: true
        default: true
        type: boolean
      run_bff:
        description: 'Run BFF Template validation'
        required: true
        default: true
        type: boolean
      run_contracts:
        description: 'Run Contracts Template validation'
        required: true
        default: true
        type: boolean
      run_webui:
        description: 'Run WebUi Template validation'
        required: true
        default: true
        type: boolean

jobs:
  validate-template-full:
    name: Validate Full Template
    if: github.event_name == 'pull_request' || inputs.run_full
    uses: gpreviatti/github-actions-templates/.github/workflows/dotnet-validate-full.yml@v1
    with:
      build_path: "./templates/Full"
      unit_test_project_path: "./templates/Full/tests/UnitTests/"
      dotnet_version: "${{ vars.PROJECT_DOTNET_VERSION }}"
      stryker_domain_config_path: "./templates/Full/tests/UnitTests/stryker-config-domain.json"
      stryker_application_config_path: "./templates/Full/tests/UnitTests/stryker-config-application.json"
      stryker_publish_dashboard_report: true
      stryker_dashboard_module_domain: "full-domain"
      stryker_dashboard_module_application: "full-application"
      integration_test_project_path: "./templates/Full/tests/IntegrationTests"
      docker_compose_file_path: "./templates/Full/docker-compose.yml"
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      stryker_dashboard_api_key: ${{ secrets.STRYKER_DASHBOARD }}

  validate-template-bff:
    name: Validate BFF Template
    if: github.event_name == 'pull_request' || inputs.run_bff
    uses: gpreviatti/github-actions-templates/.github/workflows/dotnet-validate-bff.yml@v1
    with:
      build_path: "./templates/Bff"
      dotnet_version: "${{ vars.PROJECT_DOTNET_VERSION }}"
      integration_test_project_path: "./templates/Bff/tests/IntegrationTests"
      docker_compose_file_path: "./templates/Bff/docker-compose.yml"
  
  validate-contracts-template:
    name: Validate Contracts Template
    if: github.event_name == 'pull_request' || inputs.run_contracts
    uses: gpreviatti/github-actions-templates/.github/workflows/dotnet-validate-contracts.yml@v1
    with:
      build_path: "./templates/Contracts"
      dotnet_version: "${{ vars.PROJECT_DOTNET_VERSION }}"
      test_project_path: "./templates/Contracts/tests/UnitTests/"
      stryker_config_path: "./templates/Contracts/tests/UnitTests/stryker-config.json"
      stryker_publish_dashboard_report: true
      stryker_dashboard_module: "contracts"
    secrets:
      stryker_dashboard_api_key: ${{ secrets.STRYKER_DASHBOARD }}

  validate-template-webui:
    name: Validate WebUi Template
    if: github.event_name == 'pull_request' || inputs.run_webui
    uses: gpreviatti/github-actions-templates/.github/workflows/dotnet-validate-contracts.yml@v1
    with:
      build_path: "./templates/WebUi"
      dotnet_version: "${{ vars.PROJECT_DOTNET_VERSION }}"
      test_project_path: "./templates/WebUi/tests/UnitTests/"
    secrets:
      stryker_dashboard_api_key: ${{ secrets.STRYKER_DASHBOARD }}